name: .NET CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image (Order Service)
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest -f OrderService/Dockerfile .

    - name: Push Docker Image (Order Service)
      run: docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest

    - name: Build Docker Image (Payment Service)
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/payment-service:latest -f PaymentService/Dockerfile .

    - name: Push Docker Image (Payment Service)
      run: docker push ${{ secrets.DOCKER_USERNAME }}/payment-service:latest
