version: '3.8'

services:

  # ------------------ SQL SERVER ------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "Aditya@041"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  # ------------------ ZOOKEEPER ------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # ------------------ KAFKA ------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ------------------ FLYWAY INIT ------------------
  flyway-init:
    image: flyway/flyway
    container_name: flyway-init
    depends_on:
      - sqlserver
    entrypoint: >
      /bin/sh -c "sleep 50 && flyway -url='jdbc:sqlserver://sqlserver:1433;databaseName=master;encrypt=false;trustServerCertificate=true' -user=sa -password=Aditya@041 -locations=filesystem:/flyway/sql migrate"
    volumes:
      - ./flyway/init:/flyway/sql

  # ------------------ ORDER SERVICE ------------------
  order-service:
    build:
      context: .
      dockerfile: OrderService/Dockerfile
    container_name: order-service
    depends_on:
      - sqlserver
      - kafka
      - flyway-init
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=orderdb;User Id=sa;Password=Aditya@041;TrustServerCertificate=True
      - Kafka__BootstrapServers=kafka:9092

  # ------------------ PAYMENT SERVICE ------------------
  payment-service:
    build:
      context: .
      dockerfile: PaymentService/Dockerfile
    container_name: payment-service
    depends_on:
      - sqlserver
      - kafka
      - flyway-init
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=paymentdb;User Id=sa;Password=Aditya@041;TrustServerCertificate=True
      - Kafka__BootstrapServers=kafka:9092

volumes:
  sql_data: